<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Campus Notes Studio</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f1f5f9;
        color: #0f172a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        max-width: 560px;
        margin: 24px;
        padding: 28px;
        border-radius: 28px;
        background: white;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }
      p {
        margin: 8px 0;
        line-height: 1.7;
      }
      .badge {
        display: inline-block;
        margin-bottom: 16px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #fee2e2;
        color: #991b1b;
        font-size: 12px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="badge">オフライン</span>
      <h1>Campus Notes Studio</h1>
      <p>いまネットワークに届いていません。前回までに開いたデータやキャッシュ済み画面は、そのまま使える場合があります。</p>
      <p>初回アクセス直後は、必要なファイルがまだキャッシュされていないことがあります。いちどオンライン状態で読み込んでおくと安定します。</p>
    </div>
  </body>
</html>
